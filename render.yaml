services:
  - type: web
    name: routrix-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: "gunicorn -w 4 -b 0.0.0.0:8000 main:app"
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: 3.11
    healthCheckPath: /api
    preDeployCommand: "pip install --upgrade pip"
    plan: free

databases:
  - name: routrix-sqlite
    databaseName: routrix
    plan: free
