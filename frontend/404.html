<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Construction | ROUTRIX</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Vercel Web Analytics -->
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', Arial, sans-serif;
        }

        body {
            background: #050505;
            color: white;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Modern Grid Background */
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(to right, #111 1px, transparent 1px),
                              linear-gradient(to bottom, #111 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
            mask-image: radial-gradient(circle at center, black, transparent 80%);
        }

        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
        }

        .orbitron { font-family: 'Orbitron', sans-serif; }
        .brand-red { color: #e10600; }
        
        /* Modern Shimmer & Glitch Animation */
        .modern-branding {
            position: relative;
            font-weight: 900;
            letter-spacing: 0.15em;
            background: linear-gradient(90deg, #fff 0%, #444 45%, #fff 50%, #444 55%, #fff 100%);
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: shine 4s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        /* Glitch Effect Layer */
        .glitch-wrapper {
            position: relative;
            display: inline-block;
        }

        .glitch-wrapper::before,
        .glitch-wrapper::after {
            content: "ROUTRIX";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #050505;
            clip: rect(0, 0, 0, 0);
        }

        .glitch-wrapper:hover::before {
            left: 2px;
            text-shadow: -2px 0 #ff00c1;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 5s infinite linear alternate-reverse;
        }

        .glitch-wrapper:hover::after {
            left: -2px;
            text-shadow: -2px 0 #00fff9, 2px 2px #ff00c1;
            animation: glitch-anim2 1s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% { clip: rect(31px, 9999px, 94px, 0); }
            20% { clip: rect(62px, 9999px, 42px, 0); }
            40% { clip: rect(16px, 9999px, 78px, 0); }
            60% { clip: rect(1px, 9999px, 13px, 0); }
            80% { clip: rect(87px, 9999px, 5px, 0); }
            100% { clip: rect(23px, 9999px, 98px, 0); }
        }

        .fade-up {
            animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-modern {
            position: relative;
            overflow: hidden;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(225, 6, 0, 0.3);
        }

        .btn-modern:hover {
            background: #e10600;
            box-shadow: 0 0 30px rgba(225, 6, 0, 0.4);
            transform: translateY(-2px);
        }

        .report-link {
            transition: 0.3s;
            opacity: 0.6;
        }
        .report-link:hover {
            opacity: 1;
            color: #e10600;
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>

    <main>
        <div class="fade-up max-w-2xl">
            <!-- Routrix Brand - Modern Shimmer Animation -->
            <div class="glitch-wrapper">
                <div class="orbitron modern-branding text-5xl md:text-7xl mb-6 uppercase">ROUTRIX</div>
            </div>
            
            <h1 class="orbitron text-xl md:text-3xl mb-4 font-bold uppercase tracking-[0.2em] text-zinc-300">
                THIS PAGE IS <span class="brand-red">UNDER CONSTRUCTION</span>
            </h1>
            
            <div class="h-px w-16 bg-red-600 mx-auto mb-8"></div>

            <p class="text-zinc-500 mb-12 text-xs md:text-sm tracking-widest uppercase leading-loose">
                SYSTEM UPGRADE IN PROGRESS<br>
                AUTO-REDIRECT IN <span id="timer" class="text-white font-bold">10</span> SECONDS
            </p>

            <div class="flex flex-col items-center">
                <a href="index.html" class="btn-modern orbitron bg-transparent text-white py-4 px-12 rounded-none text-[10px] tracking-[0.3em] font-black uppercase">
                    RETURN TO TERMINAL
                </a>
            </div>
        </div>
    </main>

    <footer class="p-12 text-center border-t border-white/5 bg-black/50 backdrop-blur-sm">
        <p class="text-[9px] text-zinc-600 uppercase tracking-[0.2em] mb-2">Technical Support</p>
        <a href="mailto:routrix.info@gmail.com?subject=Problem Report" class="report-link text-xs font-medium text-zinc-400">
            routrix.info@gmail.com
        </a>
        <div class="mt-8 text-[8px] text-zinc-800 uppercase tracking-[0.5em]">
            © 2024 Routrix Transport Solutions // All Rights Reserved
        </div>
    </footer>

    <script>
        window.onload = function() {
            let timeLeft = 10;
            const timerElement = document.getElementById('timer');
            
            if (timerElement) {
                const countdown = setInterval(() => {
                    timeLeft--;
                    timerElement.textContent = timeLeft;
                    
                    if (timeLeft <= 0) {
                        clearInterval(countdown);
                        window.location.href = "index.html";
                    }
                }, 1000);
            }
        };
    </script>
<script src="static/js/api-config.js"></script></body>
</html>
